name: Deploy App

# Triggers on changes to function source code.
# Also available as a manual trigger for forced re-deploys.
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

# OIDC requires id-token: write so the runner can request a token from GitHub's OIDC provider.
# contents: read is the minimum for checkout.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Lambda Function Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm ci uses package-lock.json for a deterministic, reproducible install.
      # --omit=dev excludes devDependencies from the deployment artifact.
      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Self-contained zip: node_modules included so Lambda has no remote build dependency.
      - name: Create deployment package
        run: |
          zip -r function.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude ".aws-sam/*" \
            --exclude "infra/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude ".env*" \
            --exclude "function.zip"

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name cz-capture-func \
            --zip-file fileb://function.zip
