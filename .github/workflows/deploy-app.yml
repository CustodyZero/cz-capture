name: Deploy App

# Triggers on changes to function source code.
# Also available as a manual trigger for forced re-deploys.
on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

# OIDC requires id-token: write so the runner can request a token from GitHub's OIDC provider.
# contents: read is the minimum for checkout.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Function App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # npm ci uses package-lock.json for a deterministic, reproducible install.
      # --omit=dev excludes devDependencies from the deployment artifact.
      # This project has no devDependencies but the flag is explicit for correctness.
      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Create a zip of exactly the files the runtime needs.
      # Excluded: infra/, .github/, README.md, local settings files, and any prior zip artifact.
      # node_modules is included so the deployed package is self-contained — no remote build dependency.
      - name: Create deployment package
        run: |
          zip -r function.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude "infra/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude "local.settings.json" \
            --exclude "local.settings.json.example" \
            --exclude "function.zip"

      - name: Deploy to Azure Functions
        run: |
          az functionapp deploy \
            --resource-group cz-capture-rg \
            --name cz-capture-func \
            --src-path function.zip \
            --type zip
