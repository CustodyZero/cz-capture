name: Deploy Infrastructure

# Triggers on changes to the SAM template or parameters.
# Also available as a manual trigger for forced re-deploys.
on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:

# OIDC requires id-token: write so the runner can request a token from GitHub's OIDC provider.
# contents: read is the minimum for checkout.
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy SAM Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Required so SAM packages a complete artifact — CodeUri: ./ includes node_modules.
      - name: Install production dependencies
        run: npm ci --omit=dev

      - name: Validate template
        run: sam validate --template infra/template.yaml --lint

      # --no-confirm-changeset applies changes without prompting — the push to main is the gate.
      # --no-fail-on-empty-changeset exits cleanly when there is nothing to change.
      - name: Deploy
        run: |
          sam deploy \
            --template-file infra/template.yaml \
            --stack-name cz-capture \
            --region us-east-1 \
            --capabilities CAPABILITY_IAM \
            --resolve-s3 \
            --parameter-overrides "AllowedOrigins=https://custodyzero.com,https://www.custodyzero.com,https://archon.custodyzero.com,https://www.archon.custodyzero.com" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
